<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="template.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body data-page="portfolio" data-title="Icy Silvertail | Portfolio">
    <div id="site-app">
        <main class="content-area">
            <section class="portfolio-tabs-section">
                <div class="tabs-toolbar" role="tablist" aria-label="Portfolio categories">
                    <button class="tab-button active" type="button" data-tab="tab-main">Main artworks</button>
                    <button class="tab-button" type="button" data-tab="tab-creatures">Creatures</button>
                    <button class="tab-button" type="button" data-tab="tab-sketches">Sketches</button>
                    <button class="tab-button" type="button" data-tab="tab-traditional">Traditional</button>
                </div>

                <section class="tab-panel active" id="tab-main">
                    <div class="gallery-grid" id="gallery-main"></div>
                </section>

                <section class="tab-panel" id="tab-creatures" hidden>
                    <div class="gallery-grid" id="gallery-creatures"></div>
                </section>

                <section class="tab-panel" id="tab-sketches" hidden>
                    <div class="gallery-grid" id="gallery-sketches"></div>
                </section>

                <section class="tab-panel" id="tab-traditional" hidden>
                    <div class="gallery-grid" id="gallery-traditional"></div>
                </section>
            </section>

            <div class="lightbox" id="lightbox" hidden>
                <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
                <div class="lightbox-dialog" role="dialog" aria-modal="true" aria-label="Expanded artwork view">
                    <button class="lightbox-close" id="lightboxClose" aria-label="Close image">×</button>
                    <img id="lightboxImage" src="" alt="Expanded artwork" />
                </div>
            </div>
        </main>
    </div>
</body>

</html>
